name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      - run: cargo test --no-default-features
      - run: cargo test --no-default-features --features mnemonic
      - run: cargo test --no-default-features --features airgap
      - run: cargo test --no-default-features --features mnemonic,airgap

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-features --all-targets -- -D warnings

  # Prove the crate really builds without std: cross-check for a bare-metal
  # target where no std exists to fall back on.
  no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - run: cargo check --target thumbv7em-none-eabihf --no-default-features --features mnemonic,airgap
